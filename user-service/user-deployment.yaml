apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user-service
          image: sujalpandharpatte/user-service:latest
          ports:
            - containerPort: 8080

        
          volumeMounts:
            - mountPath: "/app/data"
              name: storage

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: pvc-claim